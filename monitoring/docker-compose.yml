services:
  prometheus:
    image: prom/prometheus:latest
    container_name: cyna-prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: cyna-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: cyna-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: cyna-node-exporter
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: cyna-blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml
    restart: unless-stopped

  glpi-db:
    image: mariadb:10.11
    container_name: cyna-glpi-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: glpidb
      MYSQL_USER: glpi
      MYSQL_PASSWORD: glpipassword
    volumes:
      - glpi_db_data:/var/lib/mysql
    networks:
      - monitoring

  glpi:
    image: diouxx/glpi
    container_name: cyna-glpi
    restart: unless-stopped
    depends_on:
      - glpi-db
    ports:
      - "8080:80"
    environment:
      TIMEZONE: Europe/Paris
    volumes:
      - glpi_data:/var/www/html/glpi
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge


volumes:
  grafana_data:
  glpi_db_data:
  glpi_data:
